<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orqen Studio Installer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="installer">
      <aside class="steps" aria-label="Этапы установки">
        <strong>Orqen Studio</strong>
        <button class="active" type="button">1. Проверка</button>
        <button type="button">2. Модель</button>
        <button type="button">3. Прокси</button>
        <button type="button">4. Подготовка</button>
      </aside>

      <section class="content">
        <header class="page-header">
          <div>
            <h1>Установка окружения</h1>
            <p>Проверка инструментов и подготовка конфигурации Orqen Studio.</p>
          </div>
          <button id="run-check" class="icon-button" type="button" title="Проверить систему" aria-label="Проверить систему">
            ↻
          </button>
        </header>

        <section class="checks-panel" aria-labelledby="checks-title">
          <div class="section-title">
            <h2 id="checks-title">Система</h2>
            <span id="checks-summary">Ожидание проверки</span>
          </div>
          <div id="checks" class="checks"></div>
        </section>

        <form id="settings-form" class="settings">
          <label class="wide">
            Папка проекта
            <span class="input-row">
              <input id="install-path" name="installPath" autocomplete="off" />
              <button id="browse-path" type="button">Выбрать</button>
            </span>
          </label>

          <label class="wide">
            Репозиторий
            <input id="repo-url" name="repoUrl" autocomplete="off" />
          </label>

          <label>
            Модель по умолчанию
            <select id="model-id" name="modelId">
              <option value="ollama-qwen25-coder-7b">qwen2.5-coder:7b</option>
              <option value="ollama-deepseek-coder-67b">deepseek-coder:6.7b</option>
              <option value="ollama-deepseek-coder-33b">deepseek-coder:33b</option>
              <option value="ollama-llama32-3b">llama3.2:3b</option>
              <option value="openrouter-auto">openrouter/auto</option>
              <option value="openai-gpt-4o-mini">gpt-4o-mini</option>
            </select>
          </label>

          <label>
            Режим запуска
            <select id="runner-mode" name="runnerMode">
              <option value="auto">auto</option>
              <option value="live">live</option>
              <option value="mock">mock</option>
            </select>
          </label>

          <label>
            Cloud provider
            <select id="cloud-provider" name="cloudProvider">
              <option value="openrouter">OpenRouter</option>
              <option value="openai">OpenAI</option>
              <option value="custom">Custom</option>
            </select>
          </label>

          <label>
            Base URL
            <input id="cloud-base-url" name="cloudBaseUrl" placeholder="https://openrouter.ai/api/v1" autocomplete="off" />
          </label>

          <label class="wide">
            HTTP/SOCKS прокси
            <input id="proxy-url" name="proxyUrl" placeholder="http://127.0.0.1:7890" autocomplete="off" />
          </label>

          <label class="wide">
            API key
            <input id="api-key" name="apiKey" type="password" autocomplete="off" />
          </label>
        </form>

        <section id="result-panel" class="result-panel hidden" aria-live="polite">
          <div class="section-title">
            <h2>План</h2>
            <span id="result-status"></span>
          </div>
          <div id="warnings" class="warnings"></div>
          <div id="files" class="files"></div>
          <ol id="commands" class="commands"></ol>
        </section>

        <section id="install-panel" class="install-panel hidden" aria-live="polite">
          <div class="section-title">
            <h2>Выполнение</h2>
            <span id="install-status">Ожидание</span>
          </div>
          <div class="progress-track">
            <span id="install-progress"></span>
          </div>
          <pre id="install-log" class="install-log"></pre>
        </section>

        <footer>
          <button id="prepare-install" class="primary" type="button">Подготовить установку</button>
          <button id="start-install" class="primary" type="button">Запустить установку</button>
          <button id="cancel-install" type="button" disabled>Остановить</button>
          <button id="start-devhub" type="button">Запустить Orqen Studio</button>
          <button id="stop-devhub" type="button" disabled>Остановить Orqen Studio</button>
          <a id="devhub-link" class="app-link hidden" href="http://127.0.0.1:3000" target="_blank" rel="noreferrer">Открыть</a>
        </footer>
      </section>
    </main>

    <script src="./installer.js"></script>
  </body>
</html>
