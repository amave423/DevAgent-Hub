services:
  agent-api:
    build:
      context: ./services/agent-api
    environment:
      AGENT_CONFIG_PATH: /app/configs/agents.json
      DEVAGENT_WORKSPACE: /workspace
    volumes:
      - ./configs:/app/configs
      - agent-workspace:/workspace
    ports:
      - "8000:8000"

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm --workspace apps/web run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./:/workspace
    ports:
      - "5173:5173"
    depends_on:
      - agent-api

volumes:
  agent-workspace:
